services:
  - type: web
    name: steve-portfolio-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLIENT_ORIGIN
        value: https://stevedjens.github.io
      - key: CONTACT_TO_EMAIL
        value: stevedjen.s@gmail.com
      - key: RESEND_API_KEY
        sync: false
